name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup CangJie SDK
        run: |
          curl -fsSL "https://cangjie-lang.cn/v1/files/auth/downLoad?nsId=142267&fileName=cangjie-sdk-linux-x64-1.1.3.tar.gz&objectKey=6a19349d21f5a8178d6fd22b" | tar xz
          SDK_DIR=$(ls -d */ 2>/dev/null | head -1)
          echo "CANGJIE_HOME=$PWD/$SDK_DIR" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$PWD/$(find "$SDK_DIR" -name "libcangjie-runtime.so" -exec dirname {} \; -quit)" >> $GITHUB_ENV
          echo "$PWD/$SDK_DIR/bin" >> $GITHUB_PATH
          echo "$PWD/$SDK_DIR/tools/bin" >> $GITHUB_PATH

      - name: Build
        run: cjpm build

      - name: Test
        run: cjpm test
